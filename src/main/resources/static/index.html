<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobClaw - AI Agent Console</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        header h1 { color: #00d9ff; font-size: 2em; }
        header p { color: #888; margin-top: 10px; }
        .chat-container { display: flex; flex-direction: column; height: 70vh; background: #16213e; border-radius: 10px; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 12px 16px; border-radius: 8px; max-width: 80%; }
        .message.user { background: #0f3460; margin-left: auto; border-bottom-right-radius: 0; }
        .message.assistant { background: #1a1a2e; border-bottom-left-radius: 0; }
        .message.system { background: #2d4a22; width: 100%; text-align: center; color: #8f8; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #333; background: #1a1a2e; }
        .input-area input { flex: 1; padding: 12px 16px; border: none; border-radius: 6px; background: #0f3460; color: #fff; font-size: 14px; }
        .input-area input::placeholder { color: #666; }
        .input-area button { margin-left: 10px; padding: 12px 24px; background: #00d9ff; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .input-area button:hover { background: #00b8d4; }
        .input-area button:disabled { background: #444; cursor: not-allowed; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #0f3460; font-size: 12px; color: #888; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #00d9ff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>JobClaw</h1>
            <p>AI Agent Console - Built with Spring Boot 3.3 + Java 17</p>
        </header>
        <div class="status-bar">
            <span id="status">Status: <span id="status-value">Connecting...</span></span>
            <span id="model">Model: <span id="model-value">-</span></span>
            <span id="sessions">Sessions: <span id="sessions-count">0</span></span>
        </div>
        <div class="chat-container">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let sessionKey = 'web:' + Date.now();

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('status-value').textContent = data.status;
                document.getElementById('model-value').textContent = data.model;
                document.getElementById('sessions-count').textContent = data.sessions;
            } catch (e) {
                document.getElementById('status-value').textContent = 'Error';
            }
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = content;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addMessage('user', message);
            inputEl.value = '';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionKey })
                });
                const data = await res.json();
                if (data.success) {
                    addMessage('assistant', data.message);
                } else {
                    addMessage('system', 'Error: ' + data.error);
                }
            } catch (e) {
                addMessage('system', 'Error: ' + e.message);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                loadStatus();
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        loadStatus();
        addMessage('system', 'Welcome to JobClaw! Start chatting with the AI agent.');
    </script>
</body>
</html>
